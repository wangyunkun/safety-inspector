<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="安全质检">
<meta name="theme-color" content="#1A56DB">
<link rel="manifest" href="./manifest.json">
<title>普洱版纳区域质量安全检查助手 V6</title>
<style>
:root {
  --primary:#1A56DB; --primary-light:#EBF0FF; --primary-dark:#1447b8;
  --danger:#E02424; --danger-light:#FDE8E8;
  --success:#057A55; --success-light:#DEF7EC;
  --warning:#D03801; --warning-light:#FEF3C7;
  --caution:#B45309; --caution-light:#FFFBEB;
  --info-light:#E1EFFE;
  --bg:#F3F4F6; --surface:#FFFFFF; --surface2:#F9FAFB;
  --text-primary:#111928; --text-secondary:#6B7280; --text-hint:#9CA3AF;
  --border:#E5E7EB;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif;
  color:var(--text-primary)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;
  background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.15);position:relative}

/* TOPBAR */
.topbar{background:var(--primary);padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:56px;z-index:10}
.topbar h1{color:#fff;font-size:17px;font-weight:700;flex:1}
.count-badge{background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:10px;
  font-size:13px;font-weight:600}
.btn-back{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.topbar-title{color:#fff;font-size:15px;font-weight:600;flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}

/* VIEWS */
.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.active{display:flex}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{width:0}

/* SCENE BAR */
.scene-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.scene-bar label{font-size:13px;color:var(--text-secondary);white-space:nowrap}
.scene-bar select{flex:1;height:38px;border:1.5px solid var(--border);border-radius:10px;
  padding:0 10px;font-size:13px;background:var(--bg);color:var(--text-primary);outline:none}

/* BOTTOM BAR */
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);
  padding:10px 12px calc(var(--safe-bottom) + 10px);display:flex;gap:10px;flex-shrink:0}
.bottom-bar button{height:46px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.bottom-bar button:active{opacity:.85;transform:scale(.97)}
.btn-clear{background:var(--surface2);color:var(--text-secondary);
  border:1.5px solid var(--border)!important;min-width:80px}
.btn-copy-all{background:var(--success-light);color:var(--success);
  border:1.5px solid var(--success)!important;min-width:100px}
.btn-analyze{background:var(--primary);color:#fff;flex:1;font-size:15px;font-weight:700;
  box-shadow:0 4px 14px rgba(26,86,219,.4)}
.btn-copy-report{background:var(--primary);color:#fff;flex:1;font-size:15px;font-weight:700}

/* STATUS & PROGRESS */
.status-bar{padding:3px 14px 4px;font-size:12px;color:var(--text-secondary);flex-shrink:0}
.progress-bar{height:4px;background:var(--border);flex-shrink:0;display:none}
.progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s}

/* NAV */
.navbar{background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0}
.nav-btn{flex:1;border:none;background:transparent;padding:8px 4px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;color:var(--text-hint);font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--primary);font-weight:700}
.nav-icon{font-size:22px;line-height:1}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;flex:1;padding:40px 20px}
.empty-state .big-icon{font-size:64px}
.empty-state h2{font-size:19px;font-weight:700}
.empty-state p{font-size:14px;color:var(--text-secondary);text-align:center}

/* TASK LIST */
.task-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.task-row{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:10px 14px 10px 10px;
  cursor:pointer;transition:transform .1s}
.task-row:active{transform:scale(.98)}
.task-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;
  border:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-status{font-size:12px;color:var(--text-secondary);margin-top:3px}
.task-dot{font-size:20px;flex-shrink:0}
.task-arrow{font-size:20px;color:var(--text-hint);flex-shrink:0}

/* RISK CARD */
.risk-card{border-radius:14px;border:1.5px solid;padding:12px 14px;
  cursor:pointer;transition:transform .1s;margin-bottom:10px}
.risk-card:active{transform:scale(.99)}
.card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.card-num{width:24px;height:24px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.card-badge{padding:3px 9px;border-radius:7px;font-size:12px;font-weight:700;color:#fff}
.card-cat{padding:3px 9px;border-radius:7px;font-size:11px;color:var(--text-secondary);
  background:var(--surface);border:1px solid var(--border)}
.card-actions{margin-left:auto;display:flex;gap:6px}
.card-btn{padding:4px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.card-btn:active{opacity:.7}
.btn-edit{background:var(--info-light);color:var(--primary)}
.btn-copy-card{background:var(--primary-light);color:var(--primary)}
.btn-delete{background:var(--danger-light);color:var(--danger)}
.card-issue{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:6px}
.card-hint{font-size:11px;color:var(--text-hint);font-style:italic}
.card-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-conf{font-size:11px;color:var(--text-hint)}

/* ===== IMAGE ZOOM VIEWER ===== */
.detail-image-wrap{background:#1F2937;flex-shrink:0;position:relative;overflow:hidden;
  height:260px;touch-action:none;cursor:zoom-in}
.detail-image-wrap.zoomed{cursor:move;height:100%;position:fixed;inset:0;z-index:500}
.detail-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden}
.detail-img{max-width:100%;max-height:100%;object-fit:contain;display:block;
  transform-origin:center center;transition:transform .1s;user-select:none;pointer-events:none}
.zoom-controls{position:absolute;bottom:10px;right:10px;display:flex;gap:8px;z-index:10}
.zoom-btn{background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;
  padding:7px 12px;font-size:14px;cursor:pointer;backdrop-filter:blur(4px)}
.zoom-fullscreen-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);
  color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer;z-index:10}

/* FULLSCREEN overlay */
.fullscreen-overlay{display:none;position:fixed;inset:0;background:#000;z-index:1000;
  touch-action:none;flex-direction:column}
.fullscreen-overlay.open{display:flex}
.fs-topbar{height:50px;display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(0,0,0,.7);flex-shrink:0}
.fs-close{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-size:14px;cursor:pointer}
.fs-info{color:rgba(255,255,255,.7);font-size:13px;flex:1}
.fs-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
  position:relative}
.fs-img{max-width:100%;max-height:100%;object-fit:contain;
  transform-origin:center center;user-select:none;pointer-events:none}
.fs-zoom-bar{height:52px;display:flex;align-items:center;justify-content:center;gap:16px;
  background:rgba(0,0,0,.7);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.fs-zoom-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;
  padding:8px 20px;font-size:15px;font-weight:700;cursor:pointer}
.fs-zoom-label{color:#fff;font-size:14px;min-width:50px;text-align:center}

/* STATS CARD */
.stats-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:14px;margin-bottom:10px}
.stats-title{font-size:16px;font-weight:700;margin-bottom:10px}
.stats-badges{display:flex;flex-wrap:wrap;gap:8px}
.stat-badge{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid}
.src-label{font-size:11px;color:var(--text-hint);padding:2px 4px}

/* STATE CARD */
.state-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:40px 20px;display:flex;flex-direction:column;align-items:center;
  gap:10px;text-align:center;margin:12px}
.state-icon{font-size:48px}
.state-title{font-size:17px;font-weight:700}
.state-sub{font-size:13px;color:var(--text-secondary)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:2000;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;
  width:100%;max-width:480px;max-height:90vh;
  padding:20px 20px calc(var(--safe-bottom) + 20px);overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:6px;
  display:block;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);
  border-radius:10px;padding:10px 12px;font-size:14px;background:var(--bg);
  color:var(--text-primary);outline:none;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary)}
.form-textarea{resize:none;min-height:80px}
.form-actions{display:flex;gap:10px;margin-top:16px}
.form-actions button{flex:1;height:46px;border-radius:10px;border:none;
  font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{background:var(--surface2);color:var(--text-secondary);
  border:1.5px solid var(--border)!important}
.btn-save{background:var(--primary);color:#fff}
.btn-close-modal{background:var(--primary);color:#fff;width:100%;height:46px;
  border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
.detail-section{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:14px;margin-bottom:10px}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px}
.detail-section-body{font-size:14px;line-height:1.6}

/* SETTINGS */
.settings-section{background:var(--surface);border-radius:14px;overflow:hidden;margin-bottom:12px}
.settings-item{padding:14px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bg)}
.settings-item:last-child{border-bottom:none}
.settings-icon{font-size:20px;flex-shrink:0}
.settings-label{font-size:14px;font-weight:600;color:var(--text-primary);flex:1}
.settings-input{flex:1;border:1.5px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;background:var(--bg);outline:none;font-family:inherit}
.settings-input:focus{border-color:var(--primary)}
.settings-select{flex:1;border:1.5px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;background:var(--bg);outline:none}
.settings-save{width:100%;height:48px;background:var(--primary);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(26,86,219,.3)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;
  transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.8);color:#fff;
  padding:10px 20px;border-radius:24px;font-size:14px;white-space:nowrap;
  opacity:0;transition:all .25s;pointer-events:none;z-index:9999;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="topbar">
      <h1>🏗️ 安全质量检查AI V6</h1>
      <span class="count-badge" id="count-badge">0/20</span>
    </div>
    <div class="scene-bar">
      <label>检查场景</label>
      <select id="prompt-select">
        <option value="dual">V6 安全质量双聚焦</option>
        <option value="safety">安全隐患专项</option>
        <option value="quality">质量问题专项</option>
        <option value="critical">高危风险筛查</option>
      </select>
    </div>
    <div class="scroll-area" id="home-scroll">
      <div id="empty-state" class="empty-state">
        <div class="big-icon">📷</div>
        <h2>添加施工图片</h2>
        <p>点击下方 ➕ 添加图片<br>支持相机拍照或从相册选择</p>
      </div>
      <div id="task-list" class="task-list" style="display:none"></div>
    </div>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="bottom-bar">
      <button class="btn-clear" onclick="clearAll()">🗑 清空</button>
      <button class="btn-copy-all" onclick="copyAll()">📋 复制</button>
      <button class="btn-analyze" onclick="startAnalysis()">▶ 开始分析</button>
    </div>
    <div class="status-bar" id="status-bar">就绪</div>
  </div>

  <!-- SUMMARY VIEW -->
  <div class="view" id="view-summary">
    <div class="topbar"><h1>📊 问题汇总</h1></div>
    <div class="scroll-area"><div style="padding:12px" id="summary-content"></div></div>
    <div class="bottom-bar">
      <button class="btn-copy-report" onclick="copyAll()">📋 复制全部问题</button>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="topbar">
      <button class="btn-back" onclick="closeDetail()">‹ 返回</button>
      <span class="topbar-title" id="detail-title"></span>
    </div>
    <!-- 图片区域（带缩放） -->
    <div class="detail-image-wrap" id="detail-image-wrap">
      <div class="detail-img-inner" id="detail-img-inner">
        <img id="detail-img" src="" alt="" class="detail-img">
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomOut()">－</button>
        <button class="zoom-btn" id="zoom-label">100%</button>
        <button class="zoom-btn" onclick="zoomIn()">＋</button>
      </div>
      <button class="zoom-fullscreen-btn" onclick="openFullscreen()">⛶ 全屏</button>
    </div>
    <div class="scroll-area">
      <div style="padding:12px" id="detail-content"></div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="topbar"><h1>⚙️ 设置</h1></div>
    <div class="scroll-area">
      <div style="padding:14px;display:flex;flex-direction:column;gap:12px">
        <div class="settings-section">
          <div class="settings-item">
            <span class="settings-icon">🔑</span>
            <span class="settings-label">API Key</span>
            <input type="password" class="settings-input" id="s-apikey" placeholder="粘贴 API Key">
          </div>
          <div class="settings-item">
            <span class="settings-icon">🤖</span>
            <span class="settings-label">模型</span>
            <select class="settings-select" id="s-provider">
              <option value="qwen2.5-vl-72b">阿里百炼 Qwen2.5-VL (推荐)</option>
              <option value="qwen-vl-max">阿里百炼 Qwen-VL-Max</option>
              <option value="siliconflow">硅基流动 Qwen2-VL</option>
            </select>
          </div>
        </div>
        <button class="settings-save" onclick="saveSettings()">💾 保存设置</button>
        <div style="text-align:center;font-size:12px;color:var(--text-hint);line-height:1.6">
          API Key 仅保存在您的设备本地<br>不上传任何服务器
        </div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="navbar">
    <button class="nav-btn active" id="nav-home" onclick="switchTab(0)">
      <span class="nav-icon">🏠</span>主页
    </button>
    <button class="nav-btn" id="nav-summary" onclick="switchTab(1)">
      <span class="nav-icon">📊</span>汇总
    </button>
    <button class="nav-btn" id="nav-add" onclick="showAddMenu()">
      <span class="nav-icon">➕</span>添加
    </button>
    <button class="nav-btn" id="nav-settings" onclick="switchTab(3)">
      <span class="nav-icon">⚙️</span>设置
    </button>
  </nav>
</div>

<!-- FULLSCREEN VIEWER -->
<div class="fullscreen-overlay" id="fullscreen-overlay">
  <div class="fs-topbar">
    <button class="fs-close" onclick="closeFullscreen()">✕ 关闭</button>
    <span class="fs-info" id="fs-info">双指缩放 / 按钮缩放</span>
  </div>
  <div class="fs-img-wrap" id="fs-img-wrap">
    <img class="fs-img" id="fs-img" src="" alt="">
  </div>
  <div class="fs-zoom-bar">
    <button class="fs-zoom-btn" onclick="fsZoom(-0.25)">－</button>
    <span class="fs-zoom-label" id="fs-zoom-label">100%</span>
    <button class="fs-zoom-btn" onclick="fsZoom(+0.25)">＋</button>
    <button class="fs-zoom-btn" onclick="fsReset()">重置</button>
  </div>
</div>

<!-- ADD MENU MODAL -->
<div class="modal-overlay" id="modal-add" onclick="closeModal('modal-add')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">添加图片</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button style="height:52px;border-radius:12px;border:1.5px dashed var(--border);
        background:var(--surface);font-size:15px;font-weight:600;cursor:pointer"
        onclick="pickFiles('camera');closeModal('modal-add')">📷 拍照</button>
      <button style="height:52px;border-radius:12px;border:1.5px dashed var(--border);
        background:var(--surface);font-size:15px;font-weight:600;cursor:pointer"
        onclick="pickFiles('gallery');closeModal('modal-add')">🖼️ 从相册选择</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-edit" onclick="closeModal('modal-edit')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ 编辑问题</div>
    <div class="form-group">
      <label class="form-label">风险等级</label>
      <select class="form-select" id="edit-level">
        <option>严重安全隐患</option><option>一般安全隐患</option>
        <option>严重质量缺陷</option><option>一般质量缺陷</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">问题描述</label>
      <textarea class="form-textarea" id="edit-issue"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">规范依据</label>
      <textarea class="form-textarea" id="edit-regulation" style="min-height:60px"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">整改措施</label>
      <textarea class="form-textarea" id="edit-correction" style="min-height:60px"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-edit')">取消</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-detail" onclick="closeModal('modal-detail')">

// V6 专家提示词模板（完整版，对标v4.6的SPECIALIST_PROMPT_TEMPLATE_V6）
function buildExpertPrompt(role, kb, promptMode) {
  const criticalStr = kb.critical_hazards.map(h => `⚠️ ${h}`).join('\n');
  const checklistStr = kb.checklist.map(c => `🔍 ${c}`).join('\n');
  const mustReportStr = kb.must_report_if.map(m => `✅ ${m}`).join('\n');

  let modeNote = '';
  if (promptMode === 'safety') modeNote = '\n⚡ 本次任务：**仅识别安全隐患**，忽略质量问题。';
  else if (promptMode === 'quality') modeNote = '\n⚡ 本次任务：**仅识别质量缺陷**，忽略安全隐患。';
  else if (promptMode === 'critical') modeNote = '\n⚡ 本次任务：**仅识别严重安全隐患**，只输出risk_level为"严重安全隐患"的条目。';

  return `你是一名【${role}】（${kb.role_desc}），拥有30年一线经验。你刚检查完现场，现在要写整改通知单。${modeNote}

## 你的任务
对图片进行工艺级找茬，识别具体违规事实，不是泛泛而谈。

## 典型重大隐患清单（必须重点检查）
${criticalStr}
⚠️ 如果发现上述任一情形，必须立即报告为"严重安全隐患"！

## 深度检查清单（按此逐项扫描）
${checklistStr}

## 必须报告的情形
${mustReportStr}
✅ 发现上述任一情形，直接报告，不要犹豫！

## 核心规范依据（引用条文必须准确）
${kb.norms}

## 误判警示（以下情况不要误报）
${kb.anti_hallucination}

## 输出格式要求（JSON数组）
每个问题必须包含：
- risk_level: "严重安全隐患"/"一般安全隐患"/"严重质量缺陷"/"一般质量缺陷"
- issue: 【${role}】+ 具体描述（说人话，不要套话）
- regulation: 规范条文号（如"GB 50242-2002 第3.3.15条"）
- correction: 整改措施（具体可执行，如"立即停工，更换合格管材"）
- confidence: 0.0-1.0（不确定给0.6-0.7）

输出示例：
[
  {
    "risk_level": "严重安全隐患",
    "issue": "【${role}】使用挖掘机进行吊装作业",
    "regulation": "JGJ 33-2012 第4.1.14条",
    "correction": "立即停止违章作业，使用合格起重设备",
    "confidence": 0.98
  }
]

最后强调：
1. 不要说"可能存在""疑似"，要给出明确判断
2. 不要说"建议"，要说"必须""立即"
3. 问题描述要具体，如"DN100止回阀装反"而不是"阀门安装不规范"
4. 看到典型重大隐患，必须报告为"严重安全隐患"
5. 如果图片中确实没有${role}专业相关的问题，输出空数组[]`;
}

async function startAnalysis() {
  if(!config.api_key){showToast('⚠️ 请先在设置中配置 API Key');setTimeout(()=>switchTab(3),600);return;}
  const waiting = tasks.filter(t=>t.status==='waiting'||t.status==='error');
  if(!waiting.length){showToast('没有待分析的图片');return;}
  totalAnalyzing=waiting.length; doneAnalyzing=0;
  setProgress(0, true); setStatus(`正在分析${waiting.length}张...`);
  const promptMode = document.getElementById('prompt-select').value;
  waiting.forEach(task=>{task.status='analyzing';updateTaskStatus(task.id,'analyzing');analyzeTask(task,promptMode);});
}

async function analyzeTask(task, promptMode) {
  try {
    const preset = PROVIDERS[config.provider];
    const b64 = task.dataUrl.split(',')[1];
    task.progress_msg='🔍 智能分诊中...';
    updateTaskStatus(task.id,'analyzing','🔍 智能分诊中...');
    if(currentDetailTask?.id===task.id) renderDetailContent(task);

    // Step1: 路由
    const routerResp = await callAI(preset, ROUTER_PROMPT, '请分析施工内容并选派专家', b64, 0.1, 512);
    let roles = parseRoles(routerResp);
    if(!roles.length) roles=['安全'];
    if(!roles.includes('安全')) roles.push('安全');

    // Step2: 各专家分析
    const allIssues=[];
    for(let i=0;i<roles.length;i++){
      const role=roles[i];
      task.progress_msg=`🔬 ${role}专家分析 (${i+1}/${roles.length})`;
      updateTaskStatus(task.id,'analyzing',task.progress_msg);
      if(currentDetailTask?.id===task.id) renderDetailContent(task);
      const kb=REGULATION_DB[role]||REGULATION_DB['安全'];
      const resp=await callAI(preset, buildExpertPrompt(role,kb,promptMode), '请分析图片，找出所有问题。输出JSON数组。', b64, 0.3, 4096);
      allIssues.push(...parseIssues(resp,role));
    }
    task.status='done'; task.data=allIssues;
    const cnt=allIssues.length;
    updateTaskStatus(task.id,'done',cnt?`发现${cnt}个问题`:'未发现问题');
  } catch(err) {
    task.status='error'; task.error=err.message||'网络错误';
    updateTaskStatus(task.id,'error',task.error.slice(0,30));
  }
  if(currentDetailTask?.id===task.id) renderDetailContent(task);
  doneAnalyzing++;
  setProgress(Math.round(doneAnalyzing/totalAnalyzing*100), true);
  if(doneAnalyzing>=totalAnalyzing){
    setProgress(100, false);
    const total=tasks.reduce((s,t)=>s+(t.data?.length||0),0);
    setStatus(`分析完成，共${total}个问题`);
    showToast(`✅ 分析完成！发现${total}个问题`);
  }
}

async function callAI(preset, system, user, b64, temp=0.3, maxTokens=4096) {
  const resp = await fetch(`${preset.url}/chat/completions`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${config.api_key}`},
    body:JSON.stringify({
      model:preset.model, temperature:temp, max_tokens:maxTokens,
      messages:[
        {role:'system',content:system},
        {role:'user',content:[
          {type:'image_url',image_url:{url:`data:image/jpeg;base64,${b64}`}},
          {type:'text',text:user}
        ]}
      ]
    })
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`);}
  const data=await resp.json();
  return data.choices?.[0]?.message?.content||'';
}
function parseRoles(text){try{const m=text.match(/\[.*?\]/s);if(m)return JSON.parse(m[0]);}catch(e){}return[];}
function parseIssues(text,role){
  try{
    const clean=text.replace(/```json|```/g,'').trim();
    const s=clean.indexOf('['),e=clean.lastIndexOf(']')+1;
    if(s!==-1&&e>0){
      const arr=JSON.parse(clean.slice(s,e));
      return arr.filter(x=>typeof x==='object').map(x=>({...x,category:role}));
    }
  }catch(e){}
  return[];
}

let zoomLevel=1, zoomPanX=0, zoomPanY=0;
let isPanning=false, panStartX=0, panStartY=0, panStartPX=0, panStartPY=0;
// 双指缩放
let pinchDist=0;

function initZoom(){
  zoomLevel=1; zoomPanX=0; zoomPanY=0;
  applyZoom();
}
function applyZoom(){
  const img=document.getElementById('detail-img');
  if(!img) return;
  img.style.transform=`translate(${zoomPanX}px,${zoomPanY}px) scale(${zoomLevel})`;
  document.getElementById('zoom-label').textContent=Math.round(zoomLevel*100)+'%';
}
function zoomIn(){zoomLevel=Math.min(zoomLevel+0.25,4);zoomPanX=0;zoomPanY=0;applyZoom();}
function zoomOut(){zoomLevel=Math.max(zoomLevel-0.25,0.5);if(zoomLevel<=1){zoomPanX=0;zoomPanY=0;}applyZoom();}

function setupDetailZoom(){
  const wrap=document.getElementById('detail-img-inner');
  if(!wrap) return;
  // 双指缩放
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    } else if(e.touches.length===1&&zoomLevel>1){
      isPanning=true;
      panStartX=e.touches[0].clientX; panStartY=e.touches[0].clientY;
      panStartPX=zoomPanX; panStartPY=zoomPanY;
    }
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ratio=d/pinchDist;
      zoomLevel=Math.min(Math.max(zoomLevel*ratio,0.5),4);
      pinchDist=d; applyZoom();
    } else if(e.touches.length===1&&isPanning){
      zoomPanX=panStartPX+(e.touches[0].clientX-panStartX);
      zoomPanY=panStartPY+(e.touches[0].clientY-panStartY);
      applyZoom();
    }
  },{passive:false});
  wrap.addEventListener('touchend',()=>{isPanning=false;});
  // 双击放大
  let lastTap=0;
  wrap.addEventListener('touchend',e=>{
    const now=Date.now();
    if(now-lastTap<300){zoomLevel===1?zoomIn():initZoom();}
    lastTap=now;
  });
}

let fsZoomLevel=1, fsPanX=0, fsPanY=0;
let fsPinchDist=0, fsIsPanning=false;
let fsPanStartX=0,fsPanStartY=0,fsPanStartPX=0,fsPanStartPY=0;

function openFullscreen(){
  const src=document.getElementById('detail-img').src;
  if(!src||src==='') return;
  const fsImg=document.getElementById('fs-img');
  fsImg.src=src; fsZoomLevel=1; fsPanX=0; fsPanY=0; applyFsZoom();

  document.body.style.overflow='hidden';
  setupFsZoom();
}
function closeFullscreen(){
  document.getElementById('fullscreen-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function applyFsZoom(){
  const img=document.getElementById('fs-img');
  if(!img) return;
  img.style.transform=`translate(${fsPanX}px,${fsPanY}px) scale(${fsZoomLevel})`;
  document.getElementById('fs-zoom-label').textContent=Math.round(fsZoomLevel*100)+'%';
}
function fsZoom(delta){fsZoomLevel=Math.min(Math.max(fsZoomLevel+delta,0.5),8);if(fsZoomLevel<=1){fsPanX=0;fsPanY=0;}applyFsZoom();}
function fsReset(){fsZoomLevel=1;fsPanX=0;fsPanY=0;applyFsZoom();}

function setupFsZoom(){
  const wrap=document.getElementById('fs-img-wrap');
  wrap.removeEventListener('touchstart',fsTouchStart);
  wrap.removeEventListener('touchmove',fsTouchMove);
  wrap.removeEventListener('touchend',fsTouchEnd);
  wrap.addEventListener('touchstart',fsTouchStart,{passive:true});
  wrap.addEventListener('touchmove',fsTouchMove,{passive:false});
  wrap.addEventListener('touchend',fsTouchEnd);
}
function fsTouchStart(e){
  if(e.touches.length===2){fsPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  else if(e.touches.length===1){fsIsPanning=true;fsPanStartX=e.touches[0].clientX;fsPanStartY=e.touches[0].clientY;fsPanStartPX=fsPanX;fsPanStartPY=fsPanY;}
}
function fsTouchMove(e){
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    fsZoomLevel=Math.min(Math.max(fsZoomLevel*(d/fsPinchDist),0.5),8);
    fsPinchDist=d; applyFsZoom();
  } else if(e.touches.length===1&&fsIsPanning){
    fsPanX=fsPanStartPX+(e.touches[0].clientX-fsPanStartX);
    fsPanY=fsPanStartPY+(e.touches[0].clientY-fsPanStartY);
    applyFsZoom();
  }
}
function fsTouchEnd(){fsIsPanning=false;}

function renderDetailContent(task){
  const el=document.getElementById('detail-content');
  if(!el) return;
  el.innerHTML='';
  if(task.status==='waiting') el.innerHTML=stateCard('⏳','等待分析','点击主页「▶ 开始分析」','#9CA3AF');
  else if(task.status==='analyzing') el.innerHTML=stateCard('🔄','正在分析...',task.progress_msg||'','#1A56DB');
  else if(task.status==='error') el.innerHTML=stateCard('❌','分析失败',task.error||'','#E02424');
  else if(task.status==='done'){
    const data=task.data||[];
    if(!data.length){el.innerHTML=stateCard('✅','未发现问题','该图片未检测到明显安全质量隐患','#057A55');}
    else{
      const counts={};
      data.forEach(x=>counts[x.risk_level]=(counts[x.risk_level]||0)+1);
      const badgeHTML=Object.entries(counts).map(([lvl,cnt])=>{
        const st=RISK_STYLE[lvl]||RISK_STYLE['一般质量缺陷'];
        return `<span class="stat-badge" style="background:${st.bg};color:${st.border};border-color:${st.border}">${st.icon} ${lvl.slice(0,4)} ${cnt}个</span>`;
      }).join('');
      const stats=document.createElement('div');
      stats.className='stats-card';
      stats.innerHTML=`<div class="stats-title">共${data.length}个问题</div><div class="stats-badges">${badgeHTML}</div>`;
      el.appendChild(stats);
      [...data].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9))
        .forEach((item,i)=>el.appendChild(buildRiskCard(item,i+1,task.id)));
    }
  }
}

  const allIssues=[];
  tasks.forEach(t=>{if(t.status==='done'&&t.data) t.data.forEach(iss=>allIssues.push({...iss,_src:t.name,_tid:t.id}));});
  if(!allIssues.length){
    el.innerHTML=`<div class="state-card"><div class="state-icon">📊</div><div class="state-title">暂无分析结果</div><div class="state-sub">请先在主页添加并分析图片</div></div>`;
    return;
  }
  el.innerHTML='';
  const sorted=[...allIssues].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9));
  const counts={};
  allIssues.forEach(x=>counts[x.risk_level]=(counts[x.risk_level]||0)+1);
  const badgeHTML=['严重安全隐患','一般安全隐患','严重质量缺陷','一般质量缺陷'].filter(l=>counts[l]).map(l=>{
    const st=RISK_STYLE[l];
    return `<span class="stat-badge" style="background:${st.bg};color:${st.border};border-color:${st.border}">${st.icon} ${l.slice(0,4)} ${counts[l]}个</span>`;
  }).join('');
  const stats=document.createElement('div');
  stats.className='stats-card';
  stats.innerHTML=`<div class="stats-title">共发现${allIssues.length}个问题</div><div class="stats-badges">${badgeHTML}</div>`;
  el.appendChild(stats);
  sorted.forEach((item,i)=>{
    const src=document.createElement('div');
    src.className='src-label';src.textContent=`📷 ${item._src}`;el.appendChild(src);
    el.appendChild(buildRiskCard(item,i+1,item._tid));
  });
}

// =============================================
// 风险卡片
// =============================================
function buildRiskCard(item, index, taskId){
  const st=RISK_STYLE[item.risk_level]||RISK_STYLE['一般质量缺陷'];
  const issueShort=(item.issue||'').length>80?(item.issue||'').slice(0,80)+'...':(item.issue||'');
  const card=document.createElement('div');
  card.className='risk-card';
  card.style.cssText=`background:${st.bg};border-color:${st.border}`;
  card.innerHTML=`
    <div class="card-header">
      <div class="card-num" style="background:${st.border}">${index}</div>
      <div class="card-badge" style="background:${st.border}">${st.icon} ${item.risk_level}</div>
      ${item.category?`<div class="card-cat">${escHtml(item.category)}</div>`:''}
      <div class="card-actions">
        <button class="card-btn btn-edit">编辑</button>
        <button class="card-btn btn-copy-card">复制</button>
        <button class="card-btn btn-delete">删除</button>
      </div>
    </div>
    <div class="card-issue">${escHtml(issueShort)}</div>
    <div class="card-hint">💬 点击查看详情</div>
    ${item.regulation||item.correction?'<hr class="card-divider">':''}
    <div class="card-footer">
      <div style="display:flex;gap:8px">${item.regulation?'<span>📋</span>':''}${item.correction?'<span>✅</span>':''}</div>
      ${item.confidence?`<span class="card-conf">置信度${Math.round(item.confidence*100)}%</span>`:''}
    </div>`;
  card._item=item; card._taskId=taskId;
  card.querySelector('.btn-edit').onclick=e=>{e.stopPropagation();openEdit(item,taskId);};
  card.querySelector('.btn-copy-card').onclick=e=>{e.stopPropagation();copyIssue(item);};
  card.querySelector('.btn-delete').onclick=e=>{e.stopPropagation();deleteIssue(item,taskId);};
  card.addEventListener('click',()=>showIssueDetail(item));
  return card;
}

// =============================================
// 问题操作
// =============================================
function openEdit(item, taskId){
  editingItem=item; editingTaskId=taskId;
  document.getElementById('edit-level').value=item.risk_level||'一般质量缺陷';
  document.getElementById('edit-issue').value=item.issue||'';
  document.getElementById('edit-regulation').value=item.regulation||'';
  document.getElementById('edit-correction').value=item.correction||'';
  openModal('modal-edit');
}
function saveEdit(){
  if(!editingItem) return;
  editingItem.risk_level=document.getElementById('edit-level').value;
  editingItem.issue=document.getElementById('edit-issue').value.trim();
  editingItem.regulation=document.getElementById('edit-regulation').value.trim();
  editingItem.correction=document.getElementById('edit-correction').value.trim();
  closeModal('modal-edit');
  showToast('✓ 已保存');
  if(currentDetailTask) renderDetailContent(currentDetailTask);
  if(currentTab===1) renderSummary();
}
function deleteIssue(item, taskId){
  if(!confirm(`确定删除？\n${(item.issue||'').slice(0,50)}`)) return;
  const task=tasks.find(t=>t.id===taskId);
  if(task?.data) task.data=task.data.filter(x=>x!==item);
  showToast('✓ 已删除');
  if(currentDetailTask?.id===taskId) renderDetailContent(currentDetailTask);
  if(currentTab===1) renderSummary();
}
function copyIssue(item){
  const text=`【${item.risk_level}】\n${item.issue}\n\n📋 规范依据：${item.regulation||'—'}\n✅ 整改措施：${item.correction||'—'}`;
  copyText(text); showToast('✓ 已复制');
}
function showIssueDetail(item){
  const st=RISK_STYLE[item.risk_level]||RISK_STYLE['一般质量缺陷'];
  document.getElementById('modal-detail-content').innerHTML=`
    <div style="background:${st.border};color:#fff;padding:10px 14px;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:14px">${st.icon} ${item.risk_level}</div>
    <div class="detail-section"><div class="detail-section-title">📝 问题描述</div><div class="detail-section-body">${escHtml(item.issue||'')}</div></div>
    ${item.regulation?`<div class="detail-section"><div class="detail-section-title">📋 规范依据</div><div class="detail-section-body" style="color:var(--text-secondary)">${escHtml(item.regulation)}</div></div>`:''}
    ${item.correction?`<div class="detail-section"><div class="detail-section-title">✅ 整改措施</div><div class="detail-section-body" style="color:var(--success)">${escHtml(item.correction)}</div></div>`:''}`;
  openModal('modal-detail');
}

// =============================================
// 复制全部
// =============================================
function copyAll(){
  const allIssues=[];
  tasks.forEach(t=>{if(t.status==='done'&&t.data) t.data.forEach(iss=>allIssues.push({...iss,_src:t.name}));});
  if(!allIssues.length){showToast('暂无可复制的问题');return;}
  const sorted=[...allIssues].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9));
  const now=new Date().toLocaleString('zh-CN');
  const lines=['🏗️ 质量安全检查问题清单',`检查时间：${now}`,`分析图片：${tasks.filter(t=>t.status==='done').length}张`,`发现问题：${allIssues.length}个`,'='.repeat(40),''];
  sorted.forEach((iss,i)=>{lines.push(`${i+1}. 【${iss.risk_level}】`,`   来源：${iss._src}`,`   ${iss.issue}`,`   📋 依据：${iss.regulation||'—'}`,`   ✅ 整改：${iss.correction||'—'}`,``);});
  copyText(lines.join('\n'));
  showToast(`✅ 已复制${allIssues.length}个问题`);
}

// =============================================
// 清空
// =============================================
function clearAll(){
  if(!tasks.length) return;
  if(!confirm('确定要清空所有图片吗？')) return;
  tasks=[];
  document.getElementById('task-list').innerHTML='';
  updateCount(); setStatus('就绪'); showToast('✓ 队列已清空');
}

// =============================================
// 工具
// =============================================
function stateCard(icon,title,sub,color){
  return `<div class="state-card"><div class="state-icon">${icon}</div><div class="state-title" style="color:${color}">${escHtml(title)}</div><div class="state-sub">${escHtml(sub)}</div></div>`;
}
function setStatus(text){document.getElementById('status-bar').textContent=text;}
function setProgress(val,visible){
  const bar=document.getElementById('progress-bar');
  bar.style.display=visible?'block':'none';
  document.getElementById('progress-fill').style.width=val+'%';
}
function showToast(msg,dur=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);}
  catch(e){const el=document.createElement('textarea');el.value=text;el.style.position='fixed';el.style.opacity='0';document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
}
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

loadConfig();
updateCount();
</script>
