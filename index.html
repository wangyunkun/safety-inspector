<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="安全质检">
<meta name="theme-color" content="#1A56DB">
<link rel="manifest" href="./manifest.json">
<title>普洱版纳区域质量安全部</title>
<style>
:root {
  --primary:#1A56DB; --primary-light:#EBF0FF; --primary-dark:#1447b8;
  --danger:#E02424; --danger-light:#FDE8E8;
  --success:#057A55; --success-light:#DEF7EC;
  --warning:#D03801; --warning-light:#FEF3C7;
  --caution:#B45309; --caution-light:#FFFBEB;
  --info-light:#E1EFFE;
  --bg:#F3F4F6; --surface:#FFFFFF; --surface2:#F9FAFB;
  --text-primary:#111928; --text-secondary:#6B7280; --text-hint:#9CA3AF;
  --border:#E5E7EB;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif;
  color:var(--text-primary)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;
  background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.15);position:relative;
  padding-bottom:calc(56px + var(--safe-bottom))}

/* TOPBAR */
.topbar{background:var(--primary);padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:56px;z-index:10}
.topbar h1{color:#fff;font-size:17px;font-weight:700;flex:1}
.count-badge{background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:10px;
  font-size:13px;font-weight:600}
.btn-back{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.topbar-title{color:#fff;font-size:15px;font-weight:600;flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}

/* VIEWS */
.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.active{display:flex}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{width:0}

/* SCENE BAR */
.scene-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.scene-bar label{font-size:13px;color:var(--text-secondary);white-space:nowrap}
.scene-bar select{flex:1;height:38px;border:1.5px solid var(--border);border-radius:10px;
  padding:0 10px;font-size:13px;background:var(--bg);color:var(--text-primary);outline:none}

/* BOTTOM BAR */
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);
  padding:10px 12px calc(var(--safe-bottom) + 10px);display:flex;gap:10px;flex-shrink:0}
.bottom-bar button{height:44px;border:none;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.bottom-bar button:active{opacity:.85;transform:scale(.97)}
.btn-clear{background:var(--surface2);color:var(--text-secondary);
  border:1.5px solid var(--border)!important;min-width:80px}
.btn-copy-all{background:var(--success-light);color:var(--success);
  border:1.5px solid var(--success)!important;min-width:80px}
.btn-save-hist{background:#EDE9FE;color:#7C3AED;
  border:1.5px solid #7C3AED!important;min-width:60px}
.btn-analyze{background:var(--primary);color:#fff;flex:1;font-size:15px;font-weight:700;
  box-shadow:0 4px 14px rgba(26,86,219,.4)}
.btn-copy-report{background:var(--primary);color:#fff;flex:1;font-size:15px;font-weight:700}

/* STATUS & PROGRESS */
.status-bar{padding:3px 14px 4px;font-size:12px;color:var(--text-secondary);flex-shrink:0}
.progress-bar{height:4px;background:var(--border);flex-shrink:0;display:none}
.progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s}

/* NAV */
.navbar{background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;height:calc(56px + var(--safe-bottom))}
.nav-btn{flex:1;border:none;background:transparent;padding:6px 2px 5px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:9px;color:var(--text-hint);font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--primary);font-weight:700}
.nav-icon{font-size:20px;line-height:1}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;flex:1;padding:40px 20px}
.empty-state .big-icon{font-size:64px}
.empty-state h2{font-size:19px;font-weight:700}
.empty-state p{font-size:14px;color:var(--text-secondary);text-align:center}

/* TASK LIST */
.task-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.task-row{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:10px 14px 10px 10px;
  cursor:pointer;transition:transform .1s}
.task-row:active{transform:scale(.98)}
.task-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;
  border:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-status{font-size:12px;color:var(--text-secondary);margin-top:3px}
.task-dot{font-size:20px;flex-shrink:0}
.task-arrow{font-size:20px;color:var(--text-hint);flex-shrink:0}

/* RISK CARD */
.risk-card{
  border-radius:14px;border:1.5px solid;padding:14px;
  cursor:pointer;transition:transform .1s,box-shadow .2s;margin-bottom:12px;
  background-image:linear-gradient(to bottom right,rgba(255,255,255,0.6),transparent);
}
.risk-card:active{transform:scale(.98)}
.card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.card-num{width:24px;height:24px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.card-badge{padding:3px 9px;border-radius:7px;font-size:12px;font-weight:700;color:#fff}
.card-cat{padding:3px 9px;border-radius:7px;font-size:11px;color:var(--text-primary);
  background:var(--surface);border:1px solid var(--border);font-weight:600}
.card-actions{margin-left:auto;display:flex;gap:6px}
.card-btn{padding:4px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.card-btn:active{opacity:.7}
.btn-edit{background:var(--info-light);color:var(--primary)}
.btn-copy-card{background:var(--primary-light);color:var(--primary)}
.btn-delete{background:var(--danger-light);color:var(--danger)}
.card-issue{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:8px;color:var(--text-primary)}
.card-hint{font-size:11px;color:var(--text-hint);font-style:italic}
.card-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-conf{font-size:11px;color:var(--text-hint)}

/* IMAGE ZOOM VIEWER */
.detail-image-wrap{background:#1F2937;flex-shrink:0;position:relative;overflow:hidden;
  height:260px;touch-action:none;cursor:zoom-in}
.detail-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden}
.detail-img{max-width:100%;max-height:100%;object-fit:contain;display:block;
  transform-origin:center center;transition:transform .1s;user-select:none;pointer-events:none}
.zoom-controls{position:absolute;bottom:10px;right:10px;display:flex;gap:8px;z-index:10}
.zoom-btn{background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;
  padding:7px 12px;font-size:14px;cursor:pointer;backdrop-filter:blur(4px)}
.zoom-fullscreen-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);
  color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer;z-index:10}

/* FULLSCREEN */
.fullscreen-overlay{display:none;position:fixed;inset:0;background:#000;z-index:1000;
  touch-action:none;flex-direction:column}
.fullscreen-overlay.open{display:flex}
.fs-topbar{height:50px;display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(0,0,0,.7);flex-shrink:0}
.fs-close{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-size:14px;cursor:pointer}
.fs-info{color:rgba(255,255,255,.7);font-size:13px;flex:1}
.fs-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
  position:relative}
.fs-img{max-width:100%;max-height:100%;object-fit:contain;
  transform-origin:center center;user-select:none;pointer-events:none}
.fs-zoom-bar{height:52px;display:flex;align-items:center;justify-content:center;gap:16px;
  background:rgba(0,0,0,.7);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.fs-zoom-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;
  padding:8px 20px;font-size:15px;font-weight:700;cursor:pointer}
.fs-zoom-label{color:#fff;font-size:14px;min-width:50px;text-align:center}

/* STATS CARD */
.stats-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:14px;margin-bottom:10px}
.stats-title{font-size:16px;font-weight:700;margin-bottom:10px}
.stats-badges{display:flex;flex-wrap:wrap;gap:8px}
.stat-badge{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid}
.src-label{font-size:11px;color:var(--text-hint);padding:2px 4px}

/* STATE CARD */
.state-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:40px 20px;display:flex;flex-direction:column;align-items:center;
  gap:10px;text-align:center;margin:12px}
.state-icon{font-size:48px}
.state-title{font-size:17px;font-weight:700}
.state-sub{font-size:13px;color:var(--text-secondary)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:2000;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;
  width:100%;max-width:480px;max-height:90vh;
  padding:20px 20px calc(var(--safe-bottom) + 20px);overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--text-hint);margin-bottom:6px;
  display:block;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);
  border-radius:10px;padding:10px 12px;font-size:14px;background:var(--bg);
  color:var(--text-primary);outline:none;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary)}
.form-textarea{resize:none;min-height:80px}
.form-actions{display:flex;gap:10px;margin-top:16px}
.form-actions button{flex:1;height:46px;border-radius:10px;border:none;
  font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{background:var(--surface2);color:var(--text-secondary);
  border:1.5px solid var(--border)!important}
.btn-save{background:var(--primary);color:#fff}
.btn-close-modal{background:var(--primary);color:#fff;width:100%;height:46px;
  border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
.detail-section{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:14px;margin-bottom:10px}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px}
.detail-section-body{font-size:14px;line-height:1.6}

/* SETTINGS */
.settings-section{background:var(--surface);border-radius:14px;overflow:hidden;margin-bottom:12px}
.settings-item{padding:14px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bg)}
.settings-item:last-child{border-bottom:none}
.settings-icon{font-size:20px;flex-shrink:0}
.settings-label{font-size:14px;font-weight:600;color:var(--text-primary);flex:1}
.settings-input{flex:1;border:1.5px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;background:var(--bg);outline:none;font-family:inherit}
.settings-input:focus{border-color:var(--primary)}
.settings-select{flex:1;border:1.5px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;background:var(--bg);outline:none}
.settings-save{width:100%;height:48px;background:var(--primary);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(26,86,219,.3)}

/* TOAST */
.toast{
  position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;
  transform:translateX(-50%) translateY(20px) scale(0.9);
  background:rgba(17,25,40,0.9);backdrop-filter:blur(8px);color:#fff;
  padding:12px 24px;border-radius:30px;font-size:14px;font-weight:500;white-space:nowrap;
  opacity:0;transition:all .3s cubic-bezier(0.175,0.885,0.32,1.275);
  pointer-events:none;z-index:9999;max-width:90vw;
  box-shadow:0 8px 24px rgba(0,0,0,0.15);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* RECT STATUS */
.rect-status-bar{display:flex;gap:6px;margin-top:8px;align-items:center}
.rect-btn{border:none;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;opacity:.5}
.rect-btn.active{opacity:1;transform:scale(1.05)}
.rect-pending{background:#FEF3C7;color:#92400E}
.rect-ongoing{background:#DBEAFE;color:#1E40AF}
.rect-done{background:#D1FAE5;color:#065F46}

/* HISTORY */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:transform .1s}
.hist-card:active{transform:scale(.98)}
.hist-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hist-card-title{font-size:14px;font-weight:700;color:var(--text-primary)}
.hist-card-time{font-size:11px;color:var(--text-hint)}
.hist-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.hist-meta-badge{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface2);color:var(--text-secondary);border:1px solid var(--border)}
.hist-card-actions{display:flex;gap:8px;margin-top:10px}
.hist-action-btn{flex:1;height:34px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-secondary)}
.hist-action-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ANIMATIONS */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-in{animation:fadeInUp .35s cubic-bezier(.25,.46,.45,.94) both}
</style>
</head>
<body>
<div id="app">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="topbar">
      <h1>🏗️ 安全质量助手V4.5</h1>
      <span class="count-badge" id="count-badge">0/20</span>
    </div>
    <div class="scene-bar">
      <label>检查场景</label>
      <select id="prompt-select">
        <option value="dual">全项 安全+质量</option>
        <option value="safety">安全隐患专项</option>
        <option value="quality">质量问题专项</option>
        <option value="critical">高危风险筛查</option>
      </select>
    </div>
    <div class="scroll-area" id="home-scroll">
      <div id="empty-state" class="empty-state">
        <div class="big-icon">📷</div>
        <h2>添加施工图片</h2>
        <p>点击下方 ➕ 添加图片<br>支持相机拍照或从相册选择</p>
      </div>
      <div id="task-list" class="task-list" style="display:none"></div>
    </div>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="bottom-bar">
      <button class="btn-clear" onclick="clearAll()">🗑 清空</button>
      <button class="btn-copy-all" onclick="copyAll()">📋 快速复制</button>
      <button class="btn-save-hist" onclick="saveSessionToHistory()">💾 存档</button>
      <button class="btn-analyze" onclick="startAnalysis()">▶ 开始分析</button>
    </div>
    <div class="status-bar" id="status-bar">就绪</div>
  </div>

  <!-- SUMMARY VIEW -->
  <div class="view" id="view-summary">
    <div class="topbar"><h1>📊 问题汇总</h1></div>
    <div class="scroll-area"><div style="padding:12px" id="summary-content"></div></div>
    <div class="bottom-bar">
      <button class="btn-copy-report" onclick="copyAll()">📋 复制全部问题</button>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="topbar" style="gap:0">
      <button class="btn-back" onclick="closeDetail()">‹ 返回</button>
      <span class="topbar-title" id="detail-title" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">
        <button id="detail-prev" onclick="detailNav(-1)" style="width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;font-size:16px;cursor:pointer;color:var(--text-primary)">‹</button>
        <span id="detail-nav-label" style="font-size:12px;color:var(--text-secondary);min-width:32px;text-align:center"></span>
        <button id="detail-next" onclick="detailNav(1)" style="width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;font-size:16px;cursor:pointer;color:var(--text-primary)">›</button>
      </div>
    </div>
    <div class="detail-image-wrap" id="detail-image-wrap">
      <div class="detail-img-inner" id="detail-img-inner">
        <img id="detail-img" src="" alt="" class="detail-img">
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomOut()">－</button>
        <button class="zoom-btn" id="zoom-label">100%</button>
        <button class="zoom-btn" onclick="zoomIn()">＋</button>
      </div>
      <button class="zoom-fullscreen-btn" onclick="openFullscreen()">⛶ 全屏</button>
    </div>
    <div class="scroll-area">
      <div style="padding:12px" id="detail-content"></div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">
    <div class="topbar"><h1>🕘 历史记录</h1></div>
    <div class="scroll-area"><div style="padding:14px" id="history-content"></div></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="topbar"><h1>⚙️ 设置</h1></div>
    <div class="scroll-area">
      <div style="padding:14px;display:flex;flex-direction:column;gap:12px">
        <div class="settings-section">
          <div class="settings-item">
            <span class="settings-icon">🔑</span>
            <span class="settings-label">API Key</span>
            <input type="password" class="settings-input" id="s-apikey" placeholder="粘贴 API Key">
          </div>
          <div class="settings-item">
            <span class="settings-icon">🤖</span>
            <span class="settings-label">模型</span>
            <select class="settings-select" id="s-provider">
              <option value="qwen2.5-vl-72b">阿里百炼 Qwen2.5-VL </option>
              <option value="qwen-vl-max">阿里百炼 Qwen-VL-Max (推荐)</option>
              <option value="siliconflow">硅基流动 Qwen2-VL</option>
            </select>
          </div>
        </div>
        <button class="settings-save" onclick="saveSettings()">💾 保存设置</button>
        <div style="text-align:center;font-size:12px;color:var(--text-hint);line-height:1.6">
          API Key 仅保存在您的设备本地<br>不上传任何服务器
        </div>

        <!-- 企业内规库 -->
        <div class="settings-section">
          <div class="settings-item" style="flex-direction:column;align-items:flex-start;gap:8px">
            <div style="display:flex;align-items:center;gap:8px;width:100%">

<script>
// =============================================
// 常量
// =============================================
const PROVIDERS = {
  'qwen2.5-vl-72b':{url:'https://dashscope.aliyuncs.com/compatible-mode/v1',model:'qwen2.5-vl-72b'},
  'qwen-vl-max':   {url:'https://dashscope.aliyuncs.com/compatible-mode/v1',model:'qwen-vl-max'},
  'siliconflow':   {url:'https://api.siliconflow.cn/v1',model:'Qwen/Qwen2-VL-72B-Instruct'}
};


// =============================================
// 企业内规库系统
// =============================================

// 存储已加载的企业规范条目
// 格式: [{id, title, keywords, content, source}]
let corpRulesDB = [];

// 从 JSON 文件解析企业规范条目
function parseCorpRulesJSON(json, filename) {
  const entries = [];
  const docTitle = json.meta?.title || filename;

  function walkNode(node, parentTitle) {
    // 只处理叶节点（children为空）或level>=2的条款
    if (node.level >= 2 || (node.children && node.children.length === 0)) {
      const keywords = [];

      // 1. 从 keywords 字段提取
      if (Array.isArray(node.keywords)) {
        keywords.push(...node.keywords);
      }

      // 2. 从 content_chunk 自动提取关键词（提取2字以上汉字词组）
      const text = node.content_chunk || node.title || '';
      const autoKws = text.match(/[一-龥]{2,6}/g) || [];
      // 过滤掉常见虚词
      const stopWords = new Set(['施工现场','必须','禁止','不得','以上','以下','相关','实施','进行','使用','设置','安装','具有','规定','要求']);
      autoKws.forEach(kw => { if(!stopWords.has(kw) && kw.length >= 2) keywords.push(kw); });

      entries.push({
        id: node.id,
        title: node.title || '',
        content: node.content_chunk || node.title || '',
        keywords: [...new Set(keywords)], // 去重
        source: docTitle,
        docFile: filename
      });
    }

    // 递归处理子节点
    if (node.children && node.children.length > 0) {
      node.children.forEach(child => walkNode(child, node.title));
    }
  }

  // 处理 toc 结构
  if (json.toc) {
    json.toc.forEach(node => walkNode(node, ''));
  }

  return entries;
}

// 加载企业规范JSON文件（支持多文件）
async function loadCorpRulesFiles(files) {
  if (!files || !files.length) return;

  for (const file of Array.from(files)) {
    try {
      const text = await file.text();
      const json = JSON.parse(text);
      const entries = parseCorpRulesJSON(json, file.name);

      // 去掉同文件名的旧数据再加入新数据
      corpRulesDB = corpRulesDB.filter(e => e.docFile !== file.name);
      corpRulesDB.push(...entries);

      showToast(`✅ 已加载「${json.meta?.title || file.name}」${entries.length}条规定`);
    } catch(e) {
      showToast(`⚠️ 解析失败：${file.name}`);
    }
  }

  saveCorpRulesToStorage();
  renderCorpRulesList();
}

function clearCorpRules() {
  if (!corpRulesDB.length) return;
  if (!confirm('确定清除所有企业内规数据？')) return;
  corpRulesDB = [];
  saveCorpRulesToStorage();
  renderCorpRulesList();
  showToast('✓ 企业内规已清除');
}

// ── 从 GitHub Pages 服务器自动拉取 corp-rules/ 目录下所有 json ──
// 使用方法：将规定 json 文件放入仓库 corp-rules/ 目录，
//           并在 corp-rules/index.json 里列出文件名，例如：
//           ["临时用电十条禁令.json","质量管理规定.json"]
async function loadCorpRulesFromServer() {
  const base = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/corp-rules/';
  showToast('☁️ 正在从服务器拉取企业内规...');
  try {
    // 先拉取索引文件
    const idxResp = await fetch(base + 'index.json?t=' + Date.now());
    if (!idxResp.ok) throw new Error('未找到 corp-rules/index.json，请先创建索引文件');
    const fileList = await idxResp.json();
    if (!Array.isArray(fileList) || !fileList.length) throw new Error('index.json 为空或格式错误');

    let loaded = 0;
    for (const fname of fileList) {
      try {
        const resp = await fetch(base + encodeURIComponent(fname) + '?t=' + Date.now());
        if (!resp.ok) { console.warn('跳过：', fname); continue; }
        const json = await resp.json();
        const entries = parseCorpRulesJSON(json, fname);
        corpRulesDB = corpRulesDB.filter(e => e.docFile !== fname);
        corpRulesDB.push(...entries);
        loaded++;
      } catch(e) { console.warn('解析失败：', fname, e); }
    }

    if (loaded === 0) throw new Error('所有文件均加载失败，请检查 corp-rules/ 目录');
    saveCorpRulesToStorage();
    renderCorpRulesList();
    showToast(`✅ 已从服务器加载 ${loaded} 个规范文件`);
  } catch(e) {
    showToast('⚠️ ' + e.message);
    console.error('服务器规范加载失败:', e);
  }
}

function saveCorpRulesToStorage() {
  try { localStorage.setItem('corp_rules_db', JSON.stringify(corpRulesDB)); } 
  catch(e) { showToast('⚠️ 规范库过大无法本地保存，本次会话仍有效'); }
}

function loadCorpRulesFromStorage() {
  try {
    const s = localStorage.getItem('corp_rules_db');
    if (s) { corpRulesDB = JSON.parse(s); renderCorpRulesList(); }
  } catch(e) {}
}

function renderCorpRulesList() {
  const badge = document.getElementById('corp-rules-badge');
  const list = document.getElementById('corp-rules-list');
  if (!badge || !list) return;

  if (!corpRulesDB.length) {
    badge.textContent = '未加载';
    badge.style.background = 'var(--surface2)';
    badge.style.color = 'var(--text-hint)';
    badge.style.borderColor = 'var(--border)';
    list.style.display = 'none';
    return;
  }

  // 统计各文件条数
  const fileMap = {};
  corpRulesDB.forEach(e => {
    fileMap[e.source] = (fileMap[e.source] || 0) + 1;
  });

  badge.textContent = `${corpRulesDB.length}条规定`;
  badge.style.background = '#DEF7EC';
  badge.style.color = '#057A55';
  badge.style.borderColor = '#057A55';

  list.style.display = 'flex';
  list.innerHTML = Object.entries(fileMap).map(([src, cnt]) =>
    `<div style="font-size:11px;color:var(--text-secondary);background:var(--surface2);
      padding:4px 8px;border-radius:6px;border:1px solid var(--border)">
      📋 ${escHtml(src)} · ${cnt}条
    </div>`
  ).join('');
}

// ── 核心匹配函数：判断一条问题是否违反企业内规 ──
// 返回匹配到的规定列表（空数组=无违反）
function matchCorpRules(issue) {
  if (!corpRulesDB.length || !issue) return [];

  const issueText = (issue.issue || '') + (issue.correction || '') + (issue.category || '');
  const issueNorm = issueText.replace(/\s/g, '');

  const matched = [];

  for (const rule of corpRulesDB) {
    let score = 0;
    const hitKws = [];

    // 关键词命中计分
    for (const kw of rule.keywords) {
      if (kw.length >= 2 && issueNorm.includes(kw)) {
        score += kw.length; // 长关键词权重更高
        hitKws.push(kw);
      }
    }

    // 分数阈值：至少命中2个字符权重
    if (score >= 4 && hitKws.length >= 1) {
      matched.push({
        id: rule.id,
        title: rule.title,
        content: rule.content,
        source: rule.source,
        hitKeywords: [...new Set(hitKws)],
        score
      });
    }
  }

  // 按匹配分数排序，取最相关的前3条
  matched.sort((a, b) => b.score - a.score);
  return matched.slice(0, 3);
}

// 对一批问题批量打上企业内规标注
function annotateWithCorpRules(issues) {
  if (!corpRulesDB.length) return issues;
  return issues.map(issue => ({
    ...issue,
    _corpViolations: matchCorpRules(issue)
  }));
}

let _db = null;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db){res(_db);return;}
    const req=indexedDB.open('sc_history',1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('sessions')){
        const store=db.createObjectStore('sessions',{keyPath:'id'});
        store.createIndex('createdAt','createdAt');
      }
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=()=>rej(req.error);
  });
}
async function saveSessionToHistory(label){
  const doneTasks=tasks.filter(t=>t.status==='done');
  if(!doneTasks.length) return;
  try{
    const db=await openDB();
    const session={
      id:Date.now()+'',
      label:label||`巡检 ${new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}`,
      createdAt:Date.now(),
      taskCount:doneTasks.length,
      issueCount:doneTasks.reduce((s,t)=>s+(t.data?.length||0),0),
      tasks: doneTasks.map(t=>({
        id:t.id, name:t.name,
        dataUrl:t.dataUrl,   // 缩略图也存，方便回显
        status:t.status,
        data: (t.data||[]).map(iss=>({...iss}))
      }))
    };
    const tx=db.transaction('sessions','readwrite');
    tx.objectStore('sessions').put(session);
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
    showToast('✅ 已保存到历史记录');
  }catch(e){console.error('历史记录保存失败',e);}
}
async function loadAllSessions(){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('sessions','readonly');
      const req=tx.objectStore('sessions').index('createdAt').getAll();
      req.onsuccess=()=>res([...(req.result||[])].reverse());
      req.onerror=()=>rej(req.error);
    });
  }catch(e){return [];}
}
async function deleteSession(id){
  try{
    const db=await openDB();
    const tx=db.transaction('sessions','readwrite');
    tx.objectStore('sessions').delete(id);
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
  }catch(e){}
}

/* ===== V4 企业级图片处理架构 ===== */

// API实际限制：阿里百炼/硅基流动 base64图片上限约4MB
// 原图超过约3MB就会触发压缩，超过限制会导致API静默失败（返回空结果）
const MAX_IMG_MB = 4;        // API可接受的最大图片体积（MB）
const MAX_DIMENSION = 1600;  // 最大边长（降低token消耗，提升识别率）
const MAX_TASK = 20;
// AI_CONCURRENCY 已由新队列系统 AI_MAX_CONCURRENCY=2 接管

async function compressImage(file){
  const maxSize = MAX_IMG_MB * 1024 * 1024;

  showToast(`图片正在处理压缩，请稍候...`);

  return new Promise((resolve, reject)=>{
    const reader = new FileReader();

    reader.onerror = () => {
      showToast('⚠️ 图片读取失败，请重试');
      reject(new Error('FileReader error'));
    };

    reader.onload = e => {
      const img = new Image();

      img.onerror = () => {
        showToast('⚠️ 图片解码失败，请使用JPG/PNG格式');
        reject(new Error('Image decode error'));
      };

      img.onload = () => {
        let w = img.width;
        let h = img.height;

        // 等比缩放到最大边长限制内
        if(w > MAX_DIMENSION || h > MAX_DIMENSION){
          const ratio = Math.min(MAX_DIMENSION / w, MAX_DIMENSION / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        // 从quality=0.85开始逐步降低，直到体积达标
        let quality = 0.85;

        function loop(){
          canvas.toBlob(blob => {
            if(!blob){
              showToast('⚠️ 压缩失败，尝试使用原图');
              resolve(file);
              return;
            }
            if(blob.size <= maxSize || quality < 0.3){
              const compressed = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {type:'image/jpeg'});
              const savedMB = ((file.size - blob.size)/1024/1024).toFixed(1);
              showToast(`✓ 压缩完成，节省 ${savedMB}MB`);
              resolve(compressed);
            } else {
              quality = Math.round((quality - 0.1) * 10) / 10;
              loop();
            }
          }, 'image/jpeg', quality);
        }
        loop();
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

async function processFile(file){
  let f = file;

  // 只要超过 MAX_IMG_MB 就压缩
  if(file.size > MAX_IMG_MB * 1024 * 1024){
    try {
      f = await compressImage(file);
    } catch(e) {
      console.warn('压缩失败，使用原文件:', e);
      f = file;
    }
  }

  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('文件读取失败：' + f.name));
    reader.onload=e=>resolve({
      id:`${Date.now()}_${Math.floor(Math.random()*1e9)}`,
      name:f.name,
      dataUrl:e.target.result,
      status:'waiting',
      data:null
    });
    reader.readAsDataURL(f);
  });
}

async function handleFiles(files){

  if(!files || !files.length) return;

  const allowed = MAX_TASK - tasks.length;

  if(allowed<=0){
    showToast('最多支持20张图片');
    return;
  }

  const fileList = Array.from(files).slice(0,allowed);

  setStatus("处理中...");
  setProgress(10,true);

  for(let i=0;i<fileList.length;i++){
    try{
      const task = await processFile(fileList[i]);
      tasks.push(task);
      addTaskRow(task);
      // 直接从 row 元素找 thumb，避免 querySelector 因 id 含特殊字符而失败
      const row = document.getElementById('row-'+task.id);
      const thumbImg = row && row.querySelector('.task-thumb');
      if(thumbImg){
        thumbImg.style.cursor='zoom-in';
        thumbImg.onclick = e => { e.stopPropagation(); previewImage(task.dataUrl, task.name); };
      }
      updateCount();
    }catch(e){
      console.error('图片处理失败:', fileList[i].name, e);
      showToast(`⚠️ ${fileList[i].name} 处理失败，已跳过`);
    }
    setProgress(Math.floor((i+1)/fileList.length*100),true);
  }

  setProgress(100,false);
  setStatus("就绪");

  showToast(`✓ 已添加 ${fileList.length} 张图片`);
}

/* ═══════════════════════════════════════════════════
   AI 并发队列 v2  (FIFO · 最大并发2 · 失败重试2次)
   ═══════════════════════════════════════════════════ */

const AI_MAX_CONCURRENCY = 2;   // 最大并发数
const AI_MAX_RETRY       = 2;   // 失败最大重试次数
const AI_TIMEOUT_MS      = 90000; // 单次 API 超时 90s

let _aiRunning = 0;              // 当前运行中的任务数
const _aiQueue  = [];            // FIFO 队列，存 {fn, resolve, reject, retries}

/** 将一个 async 任务加入 FIFO 队列，返回 Promise */
function enqueueAI(fn) {
  return new Promise((resolve, reject) => {
    _aiQueue.push({ fn, resolve, reject, retries: 0 });
    _drainAIQueue();
  });
}

/** 内部：尽可能消耗队列 */
function _drainAIQueue() {
  while (_aiRunning < AI_MAX_CONCURRENCY && _aiQueue.length > 0) {
    const job = _aiQueue.shift();
    _aiRunning++;
    _runAIJob(job);
  }
}

async function _runAIJob(job) {
  try {
    const result = await job.fn();
    job.resolve(result);
  } catch (err) {
    if (job.retries < AI_MAX_RETRY) {
      job.retries++;
      const delay = 1000 * job.retries; // 递增等待：1s / 2s
      console.warn(`AI任务失败，${delay/1000}s后重试(${job.retries}/${AI_MAX_RETRY})`, err.message);
      setTimeout(() => {
        _aiQueue.unshift(job); // 重试插回队首（优先级高）
        _aiRunning--;
        _drainAIQueue();
      }, delay);
      return; // 不走下面的 _aiRunning-- 和 _drainAIQueue
    }
    job.reject(err);
  }
  _aiRunning--;
  _drainAIQueue();
}

/** 带超时的 fetch wrapper，超时抛出 Error */
async function fetchWithTimeout(url, options, ms = AI_TIMEOUT_MS) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const resp = await fetch(url, { ...options, signal: ctrl.signal });
    return resp;
  } catch (e) {
    if (e.name === 'AbortError') throw new Error(`请求超时(>${ms/1000}s)，请检查网络或缩小图片`);
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function startAnalysis(){
  if(!config.api_key){showToast('⚠️ 请先在设置中配置 API Key');setTimeout(()=>switchTab(3),600);return;}
  // 'ready' 状态已移除；只取 waiting / error 状态的任务
  const waiting=tasks.filter(t=>t.status==='waiting'||t.status==='error');
  if(!waiting.length){showToast('没有待分析的图片');return;}
  totalAnalyzing=waiting.length; doneAnalyzing=0;
  setProgress(0,true); setStatus(`排队分析 ${waiting.length} 张...`);
  const promptMode=document.getElementById('prompt-select').value;
  // 通过 enqueueAI 入 FIFO 队列，自动并发控制 + 重试
  waiting.forEach(task=>{
    task.status='analyzing';
    updateTaskStatus(task.id,'analyzing','⏳ 排队中...');
    // doneAnalyzing 计数放在队列外层，无论成功/失败/重试只计一次
    enqueueAI(()=>analyzeTask(task,promptMode)).finally(()=>{
      doneAnalyzing++;
      setProgress(Math.round(doneAnalyzing / totalAnalyzing * 100), true);
      if(doneAnalyzing >= totalAnalyzing){
        setProgress(100, false);
        const total   = tasks.reduce((s,t) => s + (t.data?.length||0), 0);
        const errored = tasks.filter(t => t.status === 'error').length;
        if(errored > 0){
          setStatus(`完成，${total}个问题，${errored}张失败`);
          showToast(`⚠️ ${errored}张分析失败，可重新点击分析`);
        } else {
          setStatus(`分析完成，共${total}个问题`);
          showToast(`✅ 分析完成！发现${total}个问题`);
        }
      }
    });
  });
}

async function analyzeTask(task, promptMode){
  try{
    const preset=PROVIDERS[config.provider];
    const b64=task.dataUrl.split(',')[1];
    task.progress_msg='🔍 智能分诊中...';
    updateTaskStatus(task.id,'analyzing','🔍 智能分诊中...');
    if(currentDetailTask?.id===task.id) renderDetailContent(task);

    const routerResp=await callAI(preset,ROUTER_PROMPT,'请分析施工内容并选派专家，只输出JSON数组',b64,0.1,256);
    let roles=parseRoles(routerResp);
    if(!roles.length) roles=['安全'];
    roles=roles.filter(r=>REGULATION_DB[r]);
    if(!roles.includes('安全')) roles.unshift('安全');
    if(roles.length>6) roles=roles.slice(0,6);

    const allRawIssues=[];
    for(let i=0;i<roles.length;i++){
      const role=roles[i];
      task.progress_msg=`🔬 ${role}专家分析 (${i+1}/${roles.length})`;
      updateTaskStatus(task.id,'analyzing',task.progress_msg);
      if(currentDetailTask?.id===task.id) renderDetailContent(task);
      const kb=REGULATION_DB[role];
      const resp=await callAI(preset,buildExpertPrompt(role,kb,promptMode),'请分析图片，找出所有问题。只输出JSON数组。',b64,0.3,2048);
      allRawIssues.push(...parseIssues(resp,role));
    }

    const deduped = deduplicateIssues(allRawIssues);
    task.data = annotateWithCorpRules(deduped); // 企业内规匹配
    task.status='done';
    const cnt=task.data.length;
    updateTaskStatus(task.id,'done',cnt?`发现${cnt}个问题`:'未发现问题');
  } catch(err) {
    task.status = 'error';
    task.error  = err.message || '网络错误';
    updateTaskStatus(task.id, 'error', task.error.slice(0, 40));
  }
  if(currentDetailTask?.id === task.id) renderDetailContent(task);
}

// =============================================
// 语义指纹去重引擎 V3（实测校准版）
// 核心思路：不同专家描述同一问题时用词差异极大，
// 纯字符串相似度失效 → 多维语义指纹：词族覆盖 + Dice + 规范条文
// =============================================

// 问题类型关键词族：命中同族词 = 属于同类问题
const ISSUE_TOPIC_GROUPS = [
  ['安全帽','头盔','防护帽','帽子','未戴帽','裸头'],          // 0
  ['安全带','安全绳','防坠','坠落','高处作业','临边','洞口'],  // 1
  ['脚手架','脚手板','踢脚板','探头板','满铺'],               // 2
  ['挖掘机','挖机','铲车','装载机','推土机'],                 // 3
  ['塔吊','起重机','吊车','吊装','吊钩','吊篮','吊物'],       // 4
  ['钢丝绳','断丝','断股','锈蚀','磨损'],                     // 5
  ['监护','指挥','监督','旁站','反光背心','无专人'],           // 6
  ['气瓶','氧气','乙炔','气焊','气割','动火'],                // 7
  ['消防通道','防火','灭火器','消防栓'],                       // 8
  ['电箱','配电箱','漏电','临时用电','电缆','电线'],           // 9
  ['模板','支撑','支架','扣件','立杆','横杆'],                 // 10
  ['钢筋','绑扎','保护层'],                                    // 11
  ['混凝土','浇筑','振捣','养护','强度'],                      // 12
  ['砌体','砌砖','砂浆','灰缝','拉结筋'],                      // 13
  ['基坑','围护','降水','放坡'],                               // 14
  ['裂缝','开裂','变形','沉降'],                               // 15
  ['防水','渗漏','积水','防潮'],                               // 16
  ['扬尘','裸土','围挡','环保'],                               // 17
  ['管道','法兰','阀门','焊缝'],                               // 18
  ['警戒','隔离','护栏','防护栏'],                             // 19
];

function extractTopicFingerprint(text) {
  const normalized = (text || '').replace(/\s/g, '');
  const matched = new Set();
  ISSUE_TOPIC_GROUPS.forEach((group, idx) => {
    if (group.some(kw => normalized.includes(kw))) matched.add(idx);
  });
  return matched;
}

// 覆盖率优先：交集 / min(A,B)，解决小集合 Jaccard 严苛问题
// 实测：脚手板(2族vs2族,交集1) → 覆盖率=0.5；安全帽(1族vs1族,交集1) → 覆盖率=1.0
function topicSimilarity(setA, setB) {
  if (!setA.size || !setB.size) return 0;
  let inter = 0;
  setA.forEach(v => { if (setB.has(v)) inter++; });
  if (inter === 0) return 0;
  const coverage = inter / Math.min(setA.size, setB.size);
  const jaccard   = inter / new Set([...setA, ...setB]).size;
  return coverage * 0.7 + jaccard * 0.3;
}

function extractRegCodes(text) {
  const codes = new Set();
  ((text || '').match(/[A-Z]{1,3}\s?\d{4,5}|第\s?\d+[\.\d]*\s?条/g) || [])
    .forEach(m => codes.add(m.replace(/\s/g, '')));
  return codes;
}

function regCodeOverlap(a, b) {
  const ra = extractRegCodes((a.regulation||'') + (a.issue||''));
  const rb = extractRegCodes((b.regulation||'') + (b.issue||''));
  if (!ra.size || !rb.size) return 0;
  let inter = 0; ra.forEach(v => { if (rb.has(v)) inter++; });
  return inter / Math.min(ra.size, rb.size);
}

function extractCore(text) {
  return (text || '')
    .replace(/【[^】]+】/g, '')
    .replace(/[，。、！？；：.,!?;:\s]/g, '')
    .replace(/立即|必须|严禁|发现|存在|现场|现象|导致|建议|未见|请|应该|应当/g, '')
    .toLowerCase().trim();
}

function diceCoefficient(str1, str2) {
  if (!str1 || !str2) return 0;
  if (str1 === str2) return 1;
  if (str1.length < 2 || str2.length < 2) return 0;
  const bg1 = new Map(), bg2 = new Map();
  for (let i = 0; i < str1.length - 1; i++) {
    const bg = str1.substring(i, i+2); bg1.set(bg, (bg1.get(bg)||0)+1);
  }
  for (let i = 0; i < str2.length - 1; i++) {
    const bg = str2.substring(i, i+2); bg2.set(bg, (bg2.get(bg)||0)+1);
  }
  let intersection = 0;
  for (const [bg, count] of bg1.entries()) {
    if (bg2.has(bg)) intersection += Math.min(count, bg2.get(bg));
  }
  return (2.0 * intersection) / ((str1.length-1) + (str2.length-1));
}

// ── 5通道综合判断：是否为同一问题 ──
function isSimilarIssue(a, b) {
  const coreA = extractCore(a.issue);
  const coreB = extractCore(b.issue);
  const diceSim = diceCoefficient(coreA, coreB);

  // 通道1：字符高度相似（表达方式接近）
  if (diceSim > 0.82) return true;

  // 通道2：同风险等级 + 字符较相似
  if (diceSim > 0.60 && a.risk_level === b.risk_level) return true;

  // 通道3：语义主题词族覆盖（核心通道，解决跨专家异词同义）
  // 阈值 0.45 经实测校准：覆盖安全帽/无监护/脚手板/钢丝绳等全场景
  const topicA = extractTopicFingerprint(a.issue + (a.correction||''));
  const topicB = extractTopicFingerprint(b.issue + (b.correction||''));
  const topicSim = topicSimilarity(topicA, topicB);
  if (topicSim >= 0.45 && a.risk_level === b.risk_level) return true;

  // 通道4：引用同一规范条文 + 同等级 + 主题有关联（兜底精确匹配）
  if (regCodeOverlap(a, b) >= 1 && a.risk_level === b.risk_level && topicSim > 0.2) return true;

  // 通道5：整改措施字符高度相似（行动一致即同一问题）
  const corrSim = diceCoefficient(extractCore(a.correction||''), extractCore(b.correction||''));
  if (corrSim > 0.75 && a.risk_level === b.risk_level) return true;

  return false;
}

// ── 去重主函数：合并同类问题并记录多专家来源 ──
function deduplicateIssues(issues) {
  if (!issues || !issues.length) return [];
  const result = [];

  // 置信度高的排前面，优先保留描述质量更高的版本
  const sortedIssues = [...issues].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));

  for (const item of sortedIssues) {
    if (!item.issue) continue;

    const dupIndex = result.findIndex(existing => isSimilarIssue(item, existing));

    if (dupIndex !== -1) {
      // ── 发现重复：合并专家信息 ──
      const existing = result[dupIndex];
      const newExpert = item.category;

      // 维护 _experts 数组（去重）
      if (!existing._experts) existing._experts = [existing.category];
      if (newExpert && !existing._experts.includes(newExpert)) {
        existing._experts.push(newExpert);
      }

      // category 字段同步更新（兼容旧逻辑）
      if (newExpert && !existing.category.includes(newExpert)) {
        existing.category += `、${newExpert}`;
      }

      // 多专家共同发现，置信度加成
      existing.confidence = Math.min((existing.confidence || 0.8) + 0.05, 1.0);

      // 取更完整的 regulation / correction（字数更多的优先）
      if ((item.regulation || '').length > (existing.regulation || '').length) {
        existing.regulation = item.regulation;
      }
      if ((item.correction || '').length > (existing.correction || '').length) {
        existing.correction = item.correction;
      }
    } else {
      // ── 新问题：初始化 _experts 数组 ──
      const copy = JSON.parse(JSON.stringify(item));
      copy._experts = copy.category ? [copy.category] : [];
      result.push(copy);
    }
  }
  return result;
}

async function callAI(preset, system, user, b64, temp=0.3, maxTokens=2048){
  // 二次校验：base64 字节数 ≈ 原始字节 * 4/3
  // API 实际限制约 4MB，base64 对应约 5.3MB 字符串
  const B64_LIMIT = 5.5 * 1024 * 1024; // 5.5MB 字符数
  if (b64 && b64.length > B64_LIMIT) {
    throw new Error(`图片 base64 过大(${(b64.length/1024/1024).toFixed(1)}MB)，请先压缩图片`);
  }

  const resp = await fetchWithTimeout(`${preset.url}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${config.api_key}`
    },
    body: JSON.stringify({
      model: preset.model, temperature: temp, max_tokens: maxTokens,
      messages: [
        { role: 'system', content: system },
        { role: 'user', content: [
          { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${b64}` } },
          { type: 'text', text: user }
        ]}
      ]
    })
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content || '';
}
function parseRoles(text){
  if(!text) return [];
  // 去掉代码块标记，找最后一个 [...] 作为结果（跳过说明性的 [注] 等）
  const clean = text.replace(/```[\s\S]*?```/g,'').replace(/`[^`]*`/g,'');
  const matches = [...clean.matchAll(/\[[^\[\]]*\]/g)];
  for(let i=matches.length-1;i>=0;i--){
    try{
      const arr=JSON.parse(matches[i][0]);
      if(Array.isArray(arr) && arr.length>0 && typeof arr[0]==='string') return arr;
    }catch(e){}
  }
  return[];
}
function parseIssues(text, role){
  if(!text) return [];
  // 策略1：去掉代码块标记后找最外层JSON数组
  try {
    const clean = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    const s = clean.indexOf('[');
    const e = clean.lastIndexOf(']') + 1;
    if(s !== -1 && e > s){
      const arr = JSON.parse(clean.slice(s, e));
      if(Array.isArray(arr)){
        return arr.filter(x => x && typeof x === 'object' && x.issue)
                  .map(x => ({...x, category: role}));
      }
    }
  } catch(err1){}
  // 策略2：逐个提取{...}对象（应对AI输出多个独立JSON对象的情况）
  try {
    const objs = [];
    let depth = 0, start = -1;
    for(let i = 0; i < text.length; i++){
      if(text[i] === '{'){
        if(depth === 0) start = i;
        depth++;
      } else if(text[i] === '}'){
        depth--;
        if(depth === 0 && start !== -1){
          try {
            const obj = JSON.parse(text.slice(start, i+1));
            if(obj && obj.issue) objs.push({...obj, category: role});
          } catch(e2){}
          start = -1;
        }
      }
    }
    if(objs.length) return objs;
  } catch(err2){}
  return [];
}

let zoomLevel=1,zoomPanX=0,zoomPanY=0,isPanning=false,pinchDist=0;
let panStartX=0,panStartY=0,panStartPX=0,panStartPY=0;
let fsZoomLevel=1,fsPanX=0,fsPanY=0,fsIsPanning=false,fsPinchDist=0;
let fsPanStartX=0,fsPanStartY=0,fsPanStartPX=0,fsPanStartPY=0;

function initZoom(){zoomLevel=1;zoomPanX=0;zoomPanY=0;applyZoom();}
function applyZoom(){
  const img=document.getElementById('detail-img');
  if(!img) return;
  img.style.transform=`translate(${zoomPanX}px,${zoomPanY}px) scale(${zoomLevel})`;
  document.getElementById('zoom-label').textContent=Math.round(zoomLevel*100)+'%';
}
function zoomIn(){zoomLevel=Math.min(zoomLevel+0.25,4);zoomPanX=0;zoomPanY=0;applyZoom();}
function zoomOut(){zoomLevel=Math.max(zoomLevel-0.25,0.5);if(zoomLevel<=1){zoomPanX=0;zoomPanY=0;}applyZoom();}

function setupDetailZoom(){
  const wrap=document.getElementById('detail-img-inner');
  if(!wrap) return;
  // 防止重复注册：已绑定则先清除
  if(wrap._zoomBound){
    wrap.removeEventListener('touchstart', wrap._onTS);
    wrap.removeEventListener('touchmove',  wrap._onTM);
    wrap.removeEventListener('touchend',   wrap._onTE);
  }
  let lastTap=0;
  wrap._onTS=e=>{
    if(e.touches.length===2){
      pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }else if(e.touches.length===1&&zoomLevel>1){
      isPanning=true;panStartX=e.touches[0].clientX;panStartY=e.touches[0].clientY;panStartPX=zoomPanX;panStartPY=zoomPanY;
    }
  };
  wrap._onTM=e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoomLevel=Math.min(Math.max(zoomLevel*(d/pinchDist),0.5),4);
      pinchDist=d;applyZoom();
    }else if(e.touches.length===1&&isPanning){
      zoomPanX=panStartPX+(e.touches[0].clientX-panStartX);
      zoomPanY=panStartPY+(e.touches[0].clientY-panStartY);
      applyZoom();
    }
  };
  wrap._onTE=e=>{
    isPanning=false;
    // 双击检测合并在同一个 touchend 处理器内
    const now=Date.now();
    if(now-lastTap<300){zoomLevel===1?zoomIn():initZoom();}
    lastTap=now;
  };
  wrap.addEventListener('touchstart', wrap._onTS, {passive:true});
  wrap.addEventListener('touchmove',  wrap._onTM, {passive:false});
  wrap.addEventListener('touchend',   wrap._onTE);
  wrap._zoomBound=true;
}

function openFullscreen(){
  const src=document.getElementById('detail-img').src;
  // 浏览器会把 src="" 补全为当前页 URL，需同时排除
  if(!src || src==='' || src===window.location.href || src===window.location.origin+'/') return;
  document.getElementById('fs-img').src=src;
  fsZoomLevel=1;fsPanX=0;fsPanY=0;applyFsZoom();
  document.getElementById('fullscreen-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  setupFsZoom();
}
function closeFullscreen(){
  document.getElementById('fullscreen-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function applyFsZoom(){
  const img=document.getElementById('fs-img');
  if(!img) return;
  img.style.transform=`translate(${fsPanX}px,${fsPanY}px) scale(${fsZoomLevel})`;
  document.getElementById('fs-zoom-label').textContent=Math.round(fsZoomLevel*100)+'%';
}
function fsZoom(delta){fsZoomLevel=Math.min(Math.max(fsZoomLevel+delta,0.5),8);if(fsZoomLevel<=1){fsPanX=0;fsPanY=0;}applyFsZoom();}
function fsReset(){fsZoomLevel=1;fsPanX=0;fsPanY=0;applyFsZoom();}
function setupFsZoom(){
  const wrap=document.getElementById('fs-img-wrap');
  const nt=e=>{
    if(e.touches.length===2) fsPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    else if(e.touches.length===1){fsIsPanning=true;fsPanStartX=e.touches[0].clientX;fsPanStartY=e.touches[0].clientY;fsPanStartPX=fsPanX;fsPanStartPY=fsPanY;}
  };
  const mm=e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      fsZoomLevel=Math.min(Math.max(fsZoomLevel*(d/fsPinchDist),0.5),8);
      fsPinchDist=d;applyFsZoom();
    }else if(e.touches.length===1&&fsIsPanning){
      fsPanX=fsPanStartPX+(e.touches[0].clientX-fsPanStartX);
      fsPanY=fsPanStartPY+(e.touches[0].clientY-fsPanStartY);
      applyFsZoom();
    }
  };
  wrap.ontouchstart=null;wrap.ontouchmove=null;wrap.ontouchend=null;
  wrap.addEventListener('touchstart',nt,{passive:true});
  wrap.addEventListener('touchmove',mm,{passive:false});
  wrap.addEventListener('touchend',()=>{fsIsPanning=false;});
}

function openDetail(task){
  currentDetailTask=task;
  _updateDetailNav();
  document.getElementById('detail-img').src=task.dataUrl||'';
  initZoom();
  ['view-home','view-summary','view-settings','view-history'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  renderDetailContent(task);
  setTimeout(setupDetailZoom,100);
  _setupDetailSwipe();
}
function _updateDetailNav(){
  const task=currentDetailTask;
  if(!task) return;
  const idx=tasks.indexOf(task);
  document.getElementById('detail-title').textContent='  '+task.name;
  document.getElementById('detail-nav-label').textContent=`${idx+1}/${tasks.length}`;
  document.getElementById('detail-prev').disabled=idx<=0;
  document.getElementById('detail-next').disabled=idx>=tasks.length-1;
  document.getElementById('detail-prev').style.opacity=idx<=0?'0.3':'1';
  document.getElementById('detail-next').style.opacity=idx>=tasks.length-1?'0.3':'1';
}
function detailNav(dir){
  const idx=tasks.indexOf(currentDetailTask);
  const next=tasks[idx+dir];
  if(!next) return;
  currentDetailTask=next;
  document.getElementById('detail-img').src=next.dataUrl||'';
  initZoom();
  renderDetailContent(next);
  _updateDetailNav();
  setTimeout(setupDetailZoom,100);
}
let _swipeStartX=0,_swipeStartY=0;
function _setupDetailSwipe(){
  const view=document.getElementById('view-detail');
  if(view._swipeBound) return;
  view._swipeBound=true;
  view.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
  },{passive:true});
  view.addEventListener('touchend',e=>{
    if(e.changedTouches.length!==1) return;
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    const dy=e.changedTouches[0].clientY-_swipeStartY;
    // 水平滑动距离 > 60px 且垂直位移 < 50px，才判定为切换手势
    if(Math.abs(dx)>60&&Math.abs(dy)<50){
      if(dx<0) detailNav(1);   // 左滑 → 下一张
      else detailNav(-1);       // 右滑 → 上一张
    }
  },{passive:true});
}
function closeDetail(){
  document.getElementById('view-detail').classList.remove('active');
  currentDetailTask=null;
  if(currentTab===0) document.getElementById('view-home').classList.add('active');
  else if(currentTab===1){document.getElementById('view-summary').classList.add('active');renderSummary();}
  else if(currentTab===3) document.getElementById('view-settings').classList.add('active');
}

function renderDetailContent(task){
  const el=document.getElementById('detail-content');
  if(!el) return;
  el.innerHTML='';
  if(task.status==='waiting') el.innerHTML=stateCard('⏳','等待分析','点击主页「▶ 开始分析」','#9CA3AF');
  else if(task.status==='analyzing') el.innerHTML=stateCard('🔄','正在分析...',task.progress_msg||'','#1A56DB');
  else if(task.status==='error') el.innerHTML=stateCard('❌','分析失败',task.error||'','#E02424');
  else if(task.status==='done'){
    const data=task.data||[];
    if(!data.length){el.innerHTML=stateCard('✅','未发现问题','该图片未检测到明显安全质量隐患','#057A55');}
    else{
      const counts={};
      data.forEach(x=>counts[x.risk_level]=(counts[x.risk_level]||0)+1);
      const badgeHTML=Object.entries(counts).map(([lvl,cnt])=>{
        const st=RISK_STYLE[lvl]||RISK_STYLE['一般质量缺陷'];
        return`<span class="stat-badge" style="background:${st.bg};color:${st.border};border-color:${st.border}">${st.icon} ${lvl.slice(0,4)} ${cnt}个</span>`;
      }).join('');
      const stats=document.createElement('div');
      stats.className='stats-card fade-in';
      stats.innerHTML=`<div class="stats-title">共${data.length}个问题</div><div class="stats-badges">${badgeHTML}</div>`;
      el.appendChild(stats);
      [...data].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9))
        .forEach((item,i)=>el.appendChild(buildRiskCard(item,i+1,task.id)));
    }
  }
}

function renderSummary(){
  const el=document.getElementById('summary-content');
  const allIssues=[];
  tasks.forEach(t=>{if(t.status==='done'&&t.data) t.data.forEach(iss=>allIssues.push({...iss,_src:t.name,_tid:t.id}));});
  if(!allIssues.length){
    el.innerHTML=`<div class="state-card fade-in"><div class="state-icon">📊</div><div class="state-title">暂无分析结果</div><div class="state-sub">请先在主页添加并分析图片</div></div>`;
    return;
  }
  el.innerHTML='';
  const sorted=[...allIssues].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9));
  const counts={};
  allIssues.forEach(x=>counts[x.risk_level]=(counts[x.risk_level]||0)+1);
  const badgeHTML=['严重安全隐患','一般安全隐患','严重质量缺陷','一般质量缺陷'].filter(l=>counts[l]).map(l=>{
    const st=RISK_STYLE[l];
    return`<span class="stat-badge" style="background:${st.bg};color:${st.border};border-color:${st.border}">${st.icon} ${l.slice(0,4)} ${counts[l]}个</span>`;
  }).join('');
  const stats=document.createElement('div');
  stats.className='stats-card fade-in';
  stats.innerHTML=`<div class="stats-title">共发现${allIssues.length}个问题</div><div class="stats-badges">${badgeHTML}</div>`;
  el.appendChild(stats);
  sorted.forEach((item,i)=>{
    const src=document.createElement('div');
    src.className='src-label fade-in';src.textContent=`📷 ${item._src}`;el.appendChild(src);
    el.appendChild(buildRiskCard(item,i+1,item._tid));
  });
}

function setRectStatus(e,btn,status,taskId){
  e.stopPropagation();
  const card=btn.closest('.risk-card');
  if(!card||!card._item) return;
  card._item.rectStatus=status;
  card.querySelectorAll('.rect-btn').forEach(b=>b.classList.remove('active'));

  showToast(labels[status]||status);
}

function copyAll(){
  const allIssues=[];
  tasks.forEach(t=>{if(t.status==='done'&&t.data) t.data.forEach(iss=>allIssues.push({...iss,_src:t.name}));});
  if(!allIssues.length){showToast('暂无可复制的问题');return;}
  const sorted=[...allIssues].sort((a,b)=>(RISK_STYLE[a.risk_level]?.priority??9)-(RISK_STYLE[b.risk_level]?.priority??9));
  const now=new Date().toLocaleString('zh-CN');
  const lines=['🏗️ 质量安全检查问题清单',`检查时间：${now}`,`分析图片：${tasks.filter(t=>t.status==='done').length}张`,`发现问题：${allIssues.length}个`,'='.repeat(40),''];
  sorted.forEach((iss,i)=>{
    const experts = iss._experts && iss._experts.length > 0 ? iss._experts : (iss.category ? [iss.category] : []);
    const expertLabel = experts.length > 1 ? `${experts.join('、')}（${experts.length}专家确认）` : (experts[0] || '—');
    const rectMap={'pending':'待整改','ongoing':'整改中','done':'已完成'};
    const rectLabel=rectMap[iss.rectStatus]||'待整改';
    const corpNote = (iss._corpViolations||[]).length ? `   🏢 违反企业内规：${(iss._corpViolations||[]).map(v=>v.id).join('、')}` : '';
    lines.push(`${i+1}. 【${iss.risk_level}】[${rectLabel}]`,`   图片：${iss._src}`,`   专业：${expertLabel}`,`   [${iss.category}] ${iss.issue}`,`   📋 依据：${iss.regulation||'—'}`,`   ✅ 整改：${iss.correction||'—'}`,...(corpNote?[corpNote]:[]),'');
  });
  copyText(lines.join('\n'));
  showToast(`✅ 已复制${allIssues.length}个问题`);
}

function clearAll(){
  if(!tasks.length) return;
  const hasDone=tasks.some(t=>t.status==='done');
  if(hasDone){
    const choice=confirm('清空前是否保存到历史记录？\n\n点击「确定」先存档再清空\n点击「取消」直接清空不保存');
    if(choice){
      saveSessionToHistory().then(()=>{
        _doClearAll();
      });
      return;
    }
  } else {
    if(!confirm('确定要清空所有图片吗？')) return;
  }
  _doClearAll();
}
function _doClearAll(){
  tasks=[];
  _aiQueue.length=0; _aiRunning=0;
  doneAnalyzing=0; totalAnalyzing=0;
  document.getElementById('task-list').innerHTML='';
  setProgress(0,false);
  updateCount();setStatus('就绪');showToast('✓ 队列已清空');
}

function stateCard(icon,title,sub,color){
  return`<div class="state-card"><div class="state-icon">${icon}</div><div class="state-title" style="color:${color}">${escHtml(title)}</div><div class="state-sub">${escHtml(sub)}</div></div>`;
}
function setStatus(text){document.getElementById('status-bar').textContent=text;}
function setProgress(val,visible){
  const bar=document.getElementById('progress-bar');
  bar.style.display=visible?'block':'none';
  document.getElementById('progress-fill').style.width=val+'%';
}

let toastTimeout = null;
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.classList.remove('show');
  if (toastTimeout) clearTimeout(toastTimeout);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      t.textContent = msg;
      t.classList.add('show');
      toastTimeout = setTimeout(() => {
        t.classList.remove('show');
      }, dur);
    });
  });
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);}
  catch(e){const el=document.createElement('textarea');el.value=text;el.style.position='fixed';el.style.opacity='0';document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
}
function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ServiceWorker 只在 HTTPS 或 localhost 环境注册，避免 file:// 报错
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.info('SW注册跳过:', err.message));
}

loadConfig();
updateCount();
</script>
